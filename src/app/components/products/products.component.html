<section class="products-section">
  <div class="max-width">
    <div class="section-header">
      <h2>Populaire sets</h2>
      <a class="view-all" (click)="onViewAll()">Bekijk alle sets →</a>
    </div>

    <div class="products-grid">
      <div class="product-card" *ngFor="let product of products">
        <div class="product-image">
          <div style="font-size: 4rem; width: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f5f5f5, #e8e8e8);">{{ product.image }}</div>
          <span *ngIf="product.badge" class="product-badge">{{ product.badge }}</span>
          <button class="wishlist-btn" (click)="onWishlist(product)" title="Add to wishlist">♡</button>
        </div>

        <div class="product-info">
          <h3 class="product-name">{{ product.name }}</h3>

          <div class="product-meta">
            <div class="meta-item">
              <span>📦</span>
              <span>{{ product.pieces }} stukjes</span>
            </div>
            <div class="meta-item">
              <span>⏱️</span>
              <span>{{ product.buildTime }} dagen huur</span>
            </div>
          </div>

          <div class="product-price">
            <span class="price">Vanaf €{{ product.price }}</span>
            <span *ngIf="product.originalPrice" class="original-price">€{{ product.originalPrice }}</span>
          </div>

          <button class="btn-add-to-cart" (click)="onAddToCart(product)">
            Huur nu →
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
